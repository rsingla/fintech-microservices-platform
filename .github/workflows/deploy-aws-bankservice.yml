name: Deploy Banking Service to AWS

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: ECR image tag to deploy
        required: false
        default: latest

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      AWS_STACK_NAME: ${{ vars.AWS_STACK_NAME || 'bankservice-apicode' }}
      AWS_ECR_REPOSITORY: ${{ vars.AWS_ECR_REPOSITORY || 'banking-service' }}
      DOMAIN_NAME: ${{ vars.DOMAIN_NAME || 'bankservice.apicode.io' }}
      HOSTED_ZONE_ID: ${{ secrets.HOSTED_ZONE_ID }}
      REPOSITORY_URL: ${{ vars.REPOSITORY_URL || format('{0}/{1}', github.server_url, github.repository) }}
      WEBSITE_URL: ${{ vars.WEBSITE_URL || 'https://apicode.io' }}
      IMAGE_TAG: ${{ inputs.image_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push banking image
        run: |
          ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          ECR_REGISTRY="$ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com"
          IMAGE_URI="$ECR_REGISTRY/$AWS_ECR_REPOSITORY:$IMAGE_TAG"

          aws ecr describe-repositories --repository-names "$AWS_ECR_REPOSITORY" >/dev/null 2>&1 || \
            aws ecr create-repository \
              --repository-name "$AWS_ECR_REPOSITORY" \
              --image-scanning-configuration scanOnPush=true \
              --encryption-configuration encryptionType=AES256 >/dev/null

          aws ecr get-login-password --region "$AWS_REGION" \
            | docker login --username AWS --password-stdin "$ECR_REGISTRY"

          docker buildx build \
            --platform linux/arm64 \
            -f services/banking-service/Dockerfile \
            -t "$IMAGE_URI" \
            --push \
            .

          echo "IMAGE_URI=$IMAGE_URI" >> "$GITHUB_ENV"

      - name: Deploy CloudFormation
        run: |
          aws cloudformation deploy \
            --stack-name "$AWS_STACK_NAME" \
            --template-file infra/aws/cloudformation/bankservice-ecs.yml \
            --capabilities CAPABILITY_IAM \
            --parameter-overrides \
              DomainName="$DOMAIN_NAME" \
              HostedZoneId="$HOSTED_ZONE_ID" \
              RepositoryUrl="$REPOSITORY_URL" \
              WebsiteUrl="$WEBSITE_URL" \
              ImageUri="$IMAGE_URI"

      - name: Show outputs
        run: |
          aws cloudformation describe-stacks \
            --stack-name "$AWS_STACK_NAME" \
            --query 'Stacks[0].Outputs' \
            --output table

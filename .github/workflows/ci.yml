name: CI

on:
  push:
    branches: [ main, modernize/** ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  security-events: write

jobs:
  build-test-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build and test
        run: ./mvnw --batch-mode clean verify

      - name: Dependency vulnerability scan
        run: ./mvnw --batch-mode -Psecurity-scan dependency-check:check

      - name: Build service images
        run: ./mvnw --batch-mode -DskipTests spring-boot:build-image

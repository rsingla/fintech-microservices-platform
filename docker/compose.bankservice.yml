name: bankservice-apicode

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fintech}
      POSTGRES_USER: ${POSTGRES_USER:-fintech}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - bankservice-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fintech} -d ${POSTGRES_DB:-fintech}"]
      interval: 10s
      timeout: 5s
      retries: 5

  banking-service:
    build:
      context: ..
      dockerfile: services/banking-service/Dockerfile
    image: ghcr.io/rsingla/banking-service:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      SERVER_PORT: 8082
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-fintech}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-fintech}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      SHOWCASE_PUBLIC_BASE_URL: https://bankservice.apicode.io
      SHOWCASE_REPOSITORY_URL: ${SHOWCASE_REPOSITORY_URL:-https://github.com/rsingla/fintech-microservices-platform}
      SHOWCASE_WEBSITE_URL: ${SHOWCASE_WEBSITE_URL:-https://apicode.io}
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8082"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8082/actuator/health/readiness | grep -q UP"]
      interval: 20s
      timeout: 5s
      retries: 10

  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      BANKSERVICE_DOMAIN: ${BANKSERVICE_DOMAIN:-bankservice.apicode.io}
      ACME_EMAIL: ${ACME_EMAIL:?ACME_EMAIL is required}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      banking-service:
        condition: service_healthy

volumes:
  bankservice-postgres:
  caddy-data:
  caddy-config:
